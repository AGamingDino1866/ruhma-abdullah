<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Ruhma & Abdullah Invitations">
  <meta property="og:description" content="Choose which Ruhma and Abdullah invitation details you want to receive.">
  <meta property="og:image" content="https://raw.githubusercontent.com/AGamingDino1866/ruhma-abdullah/main/og-envelope.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Ruhma & Abdullah Invitations">
  <meta name="twitter:description" content="Choose which Ruhma and Abdullah invitation details you want to receive.">
  <meta name="twitter:image" content="https://raw.githubusercontent.com/AGamingDino1866/ruhma-abdullah/main/og-envelope.jpg">
  <title>Ruhma & Abdullah Invitations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      overflow: auto;
      min-height: 100svh;
      background:
        radial-gradient(circle at 50% 8%, rgba(255,255,255,.62), transparent 32%),
        linear-gradient(160deg, #fff3ce, #c49a38 58%, #f8e6ae);
    }

    .chooser-page {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) 20px max(28px, env(safe-area-inset-bottom));
    }

    .chooser-card {
      width: min(90vw, 430px);
      padding: 34px 22px;
      text-align: center;
      background: rgba(255,252,242,.72);
      border: 1px solid rgba(126, 86, 20, .26);
      box-shadow: 0 28px 70px rgba(92, 61, 12, .24);
      backdrop-filter: blur(10px);
    }

    .chooser-card h1 {
      margin: 0 auto 26px;
      max-width: 12ch;
      font: 400 clamp(39px, 12vw, 60px)/.95 "Great Vibes", cursive;
      color: var(--deep);
    }

    .chooser-options {
      display: grid;
      gap: 12px;
    }

    .invite-option {
      display: grid;
      gap: 5px;
      padding: 18px 14px;
      color: #fffaf0;
      text-decoration: none;
      background: linear-gradient(135deg, #7a571f, #c6972d);
      box-shadow: 0 12px 26px rgba(92, 61, 12, .18);
    }

    .invite-option span {
      font: 600 12px "Cinzel", serif;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .invite-option strong {
      font: 500 20px "Playfair Display", serif;
    }
  </style>
</head>
<body>
  <main class="chooser-page">
    <section class="chooser-card" aria-label="Choose invitation details">
      <p class="eyebrow">Ruhma & Abdullah</p>
      <h1>Which invitation details do you want to receive?</h1>
      <div class="chooser-options">
        <a class="invite-option" href="day1.html">
          <span>Day 1</span>
          <strong>Nikah & Reception</strong>
        </a>
        <a class="invite-option" href="DAY2.html">
          <span>Day 2</span>
          <strong>Mehndi Night</strong>
        </a>
        <a class="invite-option" href="day3.html">
          <span>Day 3</span>
          <strong>Walima Dinner</strong>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
